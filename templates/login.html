<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Planner de Casamento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fdf6f8;
height:100vh;
display:flex;
align-items:center;
font-family:Arial;
}

.card{
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card p-4">

<h3 class="text-center mb-4">
💍 Planner de Casamento
</h3>

<form method="post">

<input
name="email"
class="form-control mb-3"
placeholder="Email">

<input
type="password"
name="senha"
class="form-control mb-3"
placeholder="Senha">

<button class="btn btn-primary w-100">
Entrar
</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
